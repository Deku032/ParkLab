<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Управление парковкой{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
    </style>
</head>
<body>
    <!-- Навигация -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="navbar-nav ms-auto">
        <a href="{% url 'main' %}" class="nav-link text-light">Дашборд</a>
    {% if user.is_authenticated %}
        <a href="{% url 'profile' %}" class="nav-link text-light">
            <i class="bi bi-person-circle"></i> {{ user.username }}
        </a>
        <form method="post" action="{% url 'logout' %}" style="display: inline;">
    {% csrf_token %}
    <button type="submit" class="nav-link text-light" style="background:none; border:none;">Выход</button>
</form>
    {% else %}
        <a href="{% url 'login' %}" class="nav-link text-light">
            <i class="bi bi-box-arrow-in-right"></i> Вход
        </a>
        <a href="{% url 'register' %}" class="nav-link text-light">
            <i class="bi bi-person-plus"></i> Регистрация
        </a>
    {% endif %}
</div>
    </nav>

    <!-- Сообщения -->
    <div class="container mt-3">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
    </div>

    <!-- Основной контент -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
